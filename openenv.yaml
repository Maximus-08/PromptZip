spec_version: 1
name: prompt_zip_env
description: "RL environment for learning to compress LLM prompts via elide/rephrase/preserve actions"
type: space
runtime: fastapi
app: server.app:app
port: 8000
action_schema: models.PromptZipAction
observation_schema: models.PromptZipObservation
reward_schema: models.PromptZipReward
tags:
  - openenv
  - prompt-compression
  - rl-environment

tasks:
  - name: easy_qa
    description: "Compress simple QA prompts with obvious filler"
    difficulty: easy
    grader: server.prompt_zip_environment.PromptZipEnvironment.grade

  - name: medium_compress
    description: "Compress summarization and code_gen prompts preserving structure"
    difficulty: medium
    grader: server.prompt_zip_environment.PromptZipEnvironment.grade

  - name: hard_reasoning
    description: "Compress reasoning chain prompts without breaking logic"
    difficulty: hard
    grader: server.prompt_zip_environment.PromptZipEnvironment.grade
